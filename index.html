<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Su Timer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1a1a2e;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  #canvas {
    display: block; position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
  }
  #setup {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2rem; z-index: 10;
    padding: 1rem;
  }
  .timer-options {
    display: flex; flex-wrap: wrap;
    gap: 1rem; justify-content: center;
  }
  .timer-card {
    display: flex; flex-direction: column;
    align-items: center; gap: 0.5rem;
    padding: 1.2rem 1.6rem;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    min-width: 90px;
  }
  .timer-card:hover { background: rgba(255,255,255,0.11); }
  .timer-card:active { transform: scale(0.96); }
  .timer-card .duration {
    font-size: 34px; font-weight: 300;
    font-family: 'Courier New', monospace;
    letter-spacing: -1px;
  }
  .timer-card .label {
    font-size: 11px; letter-spacing: 0.1em;
    color: rgba(255,255,255,0.4);
  }

  /* 5 dk — sarı */
  .card-yellow .duration { color: #f5c97a; }
  .card-yellow { border-color: rgba(245,201,122,0.25); }
  /* 10 dk — yeşil */
  .card-green .duration { color: #7ecb8f; }
  .card-green { border-color: rgba(126,203,143,0.25); }
  /* 15 dk — mavi */
  .card-blue .duration { color: #6ec6ee; }
  .card-blue { border-color: rgba(110,198,238,0.25); }
  /* 20 dk — mor */
  .card-purple .duration { color: #b39ddb; }
  .card-purple { border-color: rgba(179,157,219,0.25); }

  /* stats */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.8rem 1.4rem;
    justify-items: center;
  }
  .stat-block {
    display: flex; flex-direction: column;
    align-items: center; gap: 3px;
  }
  .stat-block .stat-label {
    font-size: 10px; letter-spacing: 0.07em;
    color: rgba(255,255,255,0.28);
    white-space: nowrap;
  }
  .stat-block .stat-value {
    font-size: 14px; font-weight: 400;
    font-family: 'Courier New', monospace;
  }
  .c-yellow { color: #f5c97a; }
  .c-green  { color: #7ecb8f; }
  .c-blue   { color: #6ec6ee; }
  .c-purple { color: #b39ddb; }

  .clear-btn {
    font-size: 11px; letter-spacing: 0.08em;
    color: rgba(255,255,255,0.18);
    background: none; border: none;
    cursor: pointer; padding: 4px 8px;
    transition: color 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .clear-btn:hover { color: rgba(255,255,255,0.45); }

  #timer-overlay {
    display: none; position: fixed;
    inset: 0; z-index: 10; pointer-events: none;
  }
  #reset-btn {
    position: absolute;
    left: max(1.5rem, env(safe-area-inset-left, 1.5rem));
    bottom: max(2rem, env(safe-area-inset-bottom, 2rem));
    width: 48px; height: 48px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.25);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; pointer-events: all;
    backdrop-filter: blur(6px);
    -webkit-tap-highlight-color: transparent;
    transition: background 0.12s;
  }
  #reset-btn:hover { background: rgba(0,0,0,0.4); }
  #reset-btn:active { transform: scale(0.93); }
  #reset-btn svg {
    width: 20px; height: 20px;
    stroke: rgba(255,255,255,0.7);
    fill: none; stroke-width: 2;
    stroke-linecap: round; stroke-linejoin: round;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="setup">
  <div class="timer-options">
    <div class="timer-card card-yellow" onclick="goTimer('yellow')">
      <div class="duration">5</div>
      <div class="label">dakika</div>
    </div>
    <div class="timer-card card-green" onclick="goTimer('green')">
      <div class="duration">10</div>
      <div class="label">dakika</div>
    </div>
    <div class="timer-card card-blue" onclick="goTimer('blue')">
      <div class="duration">15</div>
      <div class="label">dakika</div>
    </div>
    <div class="timer-card card-purple" onclick="goTimer('purple')">
      <div class="duration">20</div>
      <div class="label">dakika</div>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-block">
      <div class="stat-label">5 dk · oturum</div>
      <div class="stat-value c-yellow" id="yellow-sessions">0</div>
    </div>
    <div class="stat-block">
      <div class="stat-label">10 dk · oturum</div>
      <div class="stat-value c-green" id="green-sessions">0</div>
    </div>
    <div class="stat-block">
      <div class="stat-label">15 dk · oturum</div>
      <div class="stat-value c-blue" id="blue-sessions">0</div>
    </div>
    <div class="stat-block">
      <div class="stat-label">20 dk · oturum</div>
      <div class="stat-value c-purple" id="purple-sessions">0</div>
    </div>
    <div class="stat-block">
      <div class="stat-label">5 dk · toplam</div>
      <div class="stat-value c-yellow" id="yellow-total">0 dk</div>
    </div>
    <div class="stat-block">
      <div class="stat-label">10 dk · toplam</div>
      <div class="stat-value c-green" id="green-total">0 dk</div>
    </div>
    <div class="stat-block">
      <div class="stat-label">15 dk · toplam</div>
      <div class="stat-value c-blue" id="blue-total">0 dk</div>
    </div>
    <div class="stat-block">
      <div class="stat-label">20 dk · toplam</div>
      <div class="stat-value c-purple" id="purple-total">0 dk</div>
    </div>
  </div>

  <button class="clear-btn" onclick="clearStats()">kayıtları sil</button>
</div>

<div id="timer-overlay">
  <button id="reset-btn" onclick="resetTimer()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
      <path d="M3 3v5h5"/>
    </svg>
  </button>
</div>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const setupEl = document.getElementById('setup');
  const timerOverlay = document.getElementById('timer-overlay');

  let W, H;
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  /* ── THEME COLORS ──────────────────────────────────────
     Renkleri değiştirmek için gradTop ve gradBot hex değerlerini düzenle.
  ────────────────────────────────────────────────────── */
  const THEMES = {
    yellow: { gradTop: '#f5c97a', gradBot: '#c47e1a' },  /* sarı  */
    green:  { gradTop: '#7ecb8f', gradBot: '#2e7d45' },  /* yeşil */
    blue:   { gradTop: '#6ec6ee', gradBot: '#1a6fa8' },  /* mavi  */
    purple: { gradTop: '#b39ddb', gradBot: '#5e35b1' }   /* mor   */
  };

  const MINUTES = { yellow: 5, green: 10, blue: 15, purple: 20 };

  let activeTheme = 'blue';
  let totalMs = 0;
  let startTime = null;
  let elapsedBeforePause = 0;
  let rafId = null;
  let wavePhase = 0;
  let currentPct = 0;
  let done = false;
  let bubbles = [];
  let running = false;

  /* ── STATS ── */
  function loadStats() {
    try { return JSON.parse(localStorage.getItem('su_stats') || '{}'); } catch(e) { return {}; }
  }
  function saveStats(s) { localStorage.setItem('su_stats', JSON.stringify(s)); }

  function recordCompletion(theme) {
    const s = loadStats();
    if (!s[theme]) s[theme] = { sessions: 0, totalMin: 0 };
    s[theme].sessions++;
    s[theme].totalMin += MINUTES[theme];
    saveStats(s);
    renderStats();
  }

  function renderStats() {
    const s = loadStats();
    ['yellow','green','blue','purple'].forEach(t => {
      const d = s[t] || { sessions: 0, totalMin: 0 };
      document.getElementById(t + '-sessions').textContent = d.sessions;
      document.getElementById(t + '-total').textContent = d.totalMin + ' dk';
    });
  }

  function clearStats() {
    localStorage.removeItem('su_stats');
    renderStats();
  }

  /* ── PERSIST TIMER ── */
  function saveTimerState() {
    localStorage.setItem('su_timer', JSON.stringify({
      totalMs, startTime, elapsedBeforePause, done, activeTheme
    }));
  }
  function clearTimerState() { localStorage.removeItem('su_timer'); }

  function tryRestore() {
    try {
      const raw = localStorage.getItem('su_timer');
      if (!raw) return false;
      const s = JSON.parse(raw);
      totalMs = s.totalMs; elapsedBeforePause = s.elapsedBeforePause;
      done = s.done; activeTheme = s.activeTheme || 'blue';
      if (done) {
        currentPct = 100; running = false; startTime = null;
        showTimer(); spawnInitialBubbles(); return true;
      }
      const awayMs = s.startTime ? (Date.now() - s.startTime) : 0;
      elapsedBeforePause += awayMs;
      if (elapsedBeforePause >= totalMs) {
        currentPct = 100; done = true; running = false; startTime = null;
        saveTimerState(); showTimer(); spawnInitialBubbles();
      } else {
        startTime = Date.now(); running = true; showTimer();
      }
      return true;
    } catch(e) { return false; }
  }

  document.addEventListener('visibilitychange', () => {
    if (!running) return;
    if (document.hidden) {
      elapsedBeforePause += Date.now() - startTime;
      startTime = null; saveTimerState();
    } else {
      startTime = Date.now(); saveTimerState();
    }
  });

  function getElapsedMs() {
    if (!running || !startTime) return elapsedBeforePause;
    return elapsedBeforePause + (Date.now() - startTime);
  }

  /* ── BUBBLES ── */
  function spawnBubble() {
    bubbles.push({
      x: Math.random() * W, y: H,
      r: 3 + Math.random() * 8,
      speed: 0.8 + Math.random() * 1.6,
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: 0.02 + Math.random() * 0.04,
      alpha: 0.4 + Math.random() * 0.4
    });
  }
  function spawnInitialBubbles() { for (let i = 0; i < 18; i++) spawnBubble(); }

  /* ── DRAW ── */
  function drawFrame() {
    if (running && !done) {
      const elapsed = getElapsedMs();
      currentPct = Math.min((elapsed / totalMs) * 100, 100);
      if (currentPct >= 100) {
        currentPct = 100; done = true; running = false; startTime = null;
        saveTimerState(); recordCompletion(activeTheme); spawnInitialBubbles();
      }
    }

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, W, H);

    if (currentPct > 0) {
      const theme = THEMES[activeTheme];
      const waterTop = H - (currentPct / 100) * H;
      const amp = done ? 0 : 1;
      const t = wavePhase;

      ctx.beginPath();
      ctx.moveTo(0, H);
      const steps = 120;
      for (let i = 0; i <= steps; i++) {
        const x = (i / steps) * W;
        const nx = i / steps;
        const y = waterTop
          + Math.sin(t * 1.1 + nx * Math.PI * 3.7) * (H * 0.012) * amp
          + Math.sin(t * 0.7 + nx * Math.PI * 6.3) * (H * 0.008) * amp
          + Math.sin(t * 1.6 + nx * Math.PI * 2.1) * (H * 0.005) * amp;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(W, H);
      ctx.closePath();

      const grad = ctx.createLinearGradient(0, waterTop, 0, H);
      grad.addColorStop(0, theme.gradTop);
      grad.addColorStop(1, theme.gradBot);
      ctx.fillStyle = grad;
      ctx.fill();

      if (done) {
        bubbles.forEach(b => {
          b.y -= b.speed; b.wobble += b.wobbleSpeed;
          b.x += Math.sin(b.wobble) * 0.7;
          if (b.y - b.r < waterTop) b.alpha -= 0.05;
          if (b.alpha > 0) {
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255,255,255,${b.alpha})`;
            ctx.lineWidth = 1.4; ctx.stroke();
            ctx.beginPath();
            ctx.arc(b.x - b.r * 0.3, b.y - b.r * 0.35, b.r * 0.35, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,255,${b.alpha * 0.55})`;
            ctx.fill();
          }
        });
        bubbles = bubbles.filter(b => b.alpha > 0 && b.y > -20);
        if (Math.random() < 0.22) spawnBubble();
      }

      wavePhase += 0.032;
    }

    rafId = requestAnimationFrame(drawFrame);
  }

  /* ── CONTROLS ── */
  function showTimer() {
    setupEl.style.display = 'none';
    timerOverlay.style.display = 'block';
    cancelAnimationFrame(rafId);
    drawFrame();
  }

  function goTimer(theme) {
    activeTheme = theme;
    totalMs = MINUTES[theme] * 60 * 1000;
    elapsedBeforePause = 0; startTime = Date.now();
    currentPct = 0; done = false; running = true;
    wavePhase = 0; bubbles = [];
    saveTimerState(); showTimer();
  }

  function resetTimer() {
    cancelAnimationFrame(rafId);
    running = false; done = false; currentPct = 0;
    elapsedBeforePause = 0; startTime = null;
    wavePhase = 0; bubbles = [];
    clearTimerState();
    ctx.clearRect(0, 0, W, H);
    timerOverlay.style.display = 'none';
    setupEl.style.display = 'flex';
  }

  renderStats();
  tryRestore();
</script>
</body>
</html>
