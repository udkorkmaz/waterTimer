<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Su Timer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1a1a2e;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  #canvas {
    display: block; position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
  }
  #setup {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2rem; z-index: 10;
  }
  #setup p {
    font-size: 15px; color: rgba(255,255,255,0.45);
    letter-spacing: 0.1em;
  }
  .controls { display: flex; align-items: center; gap: 28px; }
  .min-btn {
    width: 52px; height: 52px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.08);
    font-size: 26px; cursor: pointer;
    color: rgba(255,255,255,0.8);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .min-btn:hover { background: rgba(255,255,255,0.15); }
  .min-btn:active { transform: scale(0.93); }
  #min-display {
    font-size: 52px; font-weight: 300;
    min-width: 120px; text-align: center;
    color: #fff; font-family: 'Courier New', monospace;
    letter-spacing: -1px;
  }
  .start-btn {
    padding: 14px 48px; border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(90,184,236,0.25);
    color: #fff; font-size: 16px; cursor: pointer;
    letter-spacing: 0.08em; transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .start-btn:hover { background: rgba(90,184,236,0.4); }
  .start-btn:active { transform: scale(0.97); }
  #timer-overlay {
    display: none; position: fixed;
    inset: 0; z-index: 10; pointer-events: none;
  }
  #reset-btn {
    position: absolute;
    left: max(1.5rem, env(safe-area-inset-left, 1.5rem));
    bottom: max(2rem, env(safe-area-inset-bottom, 2rem));
    width: 48px; height: 48px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.25);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; pointer-events: all;
    backdrop-filter: blur(6px);
    -webkit-tap-highlight-color: transparent;
    transition: background 0.12s;
  }
  #reset-btn:hover { background: rgba(0,0,0,0.4); }
  #reset-btn:active { transform: scale(0.93); }
  #reset-btn svg {
    width: 20px; height: 20px;
    stroke: rgba(255,255,255,0.7);
    fill: none; stroke-width: 2;
    stroke-linecap: round; stroke-linejoin: round;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="setup">
  <p>kaç dakika?</p>
  <div class="controls">
    <button class="min-btn" onclick="changeMin(-1)">−</button>
    <div id="min-display">5 dk</div>
    <button class="min-btn" onclick="changeMin(1)">+</button>
  </div>
  <button class="start-btn" onclick="goTimer()">başlat</button>
</div>

<div id="timer-overlay">
  <button id="reset-btn" onclick="resetTimer()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
      <path d="M3 3v5h5"/>
    </svg>
  </button>
</div>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const setupEl = document.getElementById('setup');
  const timerOverlay = document.getElementById('timer-overlay');
  const minDisplay = document.getElementById('min-display');

  let W, H;
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  let minutes = 5;
  let totalMs = 0;
  let startTime = null;
  let elapsedBeforePause = 0;
  let rafId = null;
  let wavePhase = 0;
  let currentPct = 0;
  let done = false;
  let bubbles = [];
  let running = false;

  // localStorage helpers
  function saveState() {
    localStorage.setItem('su_timer', JSON.stringify({
      totalMs,
      startTime,
      elapsedBeforePause,
      done
    }));
  }

  function clearState() {
    localStorage.removeItem('su_timer');
  }

  function loadState() {
    try {
      const raw = localStorage.getItem('su_timer');
      if (!raw) return null;
      return JSON.parse(raw);
    } catch(e) { return null; }
  }

  // Restore session on page load
  function tryRestore() {
    const s = loadState();
    if (!s) return false;

    totalMs = s.totalMs;
    elapsedBeforePause = s.elapsedBeforePause;
    done = s.done;

    if (done) {
      // Timer already finished while away
      currentPct = 100;
      running = false;
      startTime = null;
      showTimer();
      for (let i = 0; i < 18; i++) spawnBubble();
      return true;
    }

    // Calculate how much time passed while browser was closed
    const awayMs = s.startTime ? (Date.now() - s.startTime) : 0;
    elapsedBeforePause += awayMs;

    if (elapsedBeforePause >= totalMs) {
      // Finished while away
      currentPct = 100;
      done = true;
      running = false;
      startTime = null;
      saveState();
      showTimer();
      for (let i = 0; i < 18; i++) spawnBubble();
    } else {
      // Still running
      startTime = Date.now();
      running = true;
      showTimer();
    }
    return true;
  }

  function showTimer() {
    setupEl.style.display = 'none';
    timerOverlay.style.display = 'block';
    cancelAnimationFrame(rafId);
    drawFrame();
  }

  function changeMin(d) {
    minutes = Math.max(1, Math.min(99, minutes + d));
    minDisplay.textContent = minutes + ' dk';
  }

  document.addEventListener('visibilitychange', () => {
    if (!running) return;
    if (document.hidden) {
      elapsedBeforePause += Date.now() - startTime;
      startTime = null;
      saveState();
    } else {
      startTime = Date.now();
      saveState();
    }
  });

  function getElapsedMs() {
    if (!running) return elapsedBeforePause;
    if (!startTime) return elapsedBeforePause;
    return elapsedBeforePause + (Date.now() - startTime);
  }

  function spawnBubble() {
    bubbles.push({
      x: Math.random() * W,
      y: H,
      r: 3 + Math.random() * 8,
      speed: 0.8 + Math.random() * 1.6,
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: 0.02 + Math.random() * 0.04,
      alpha: 0.4 + Math.random() * 0.4
    });
  }

  function drawFrame() {
    if (running && !done) {
      const elapsed = getElapsedMs();
      currentPct = Math.min((elapsed / totalMs) * 100, 100);
      if (currentPct >= 100) {
        currentPct = 100;
        done = true;
        running = false;
        startTime = null;
        saveState();
        for (let i = 0; i < 18; i++) spawnBubble();
      }
    }

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, W, H);

    if (currentPct > 0) {
      const waterTop = H - (currentPct / 100) * H;
      const amp = done ? 0 : 1;
      const t = wavePhase;

      ctx.beginPath();
      ctx.moveTo(0, H);
      const steps = 120;
      for (let i = 0; i <= steps; i++) {
        const x = (i / steps) * W;
        const nx = i / steps;
        const y = waterTop
          + Math.sin(t * 1.1 + nx * Math.PI * 3.7) * (H * 0.012) * amp
          + Math.sin(t * 0.7 + nx * Math.PI * 6.3) * (H * 0.008) * amp
          + Math.sin(t * 1.6 + nx * Math.PI * 2.1) * (H * 0.005) * amp;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(W, H);
      ctx.closePath();

      const grad = ctx.createLinearGradient(0, waterTop, 0, H);
      grad.addColorStop(0, '#6ec6ee');
      grad.addColorStop(1, '#1a6fa8');
      ctx.fillStyle = grad;
      ctx.fill();

      if (done) {
        bubbles.forEach(b => {
          b.y -= b.speed;
          b.wobble += b.wobbleSpeed;
          b.x += Math.sin(b.wobble) * 0.7;
          if (b.y - b.r < waterTop) b.alpha -= 0.05;
          if (b.alpha > 0) {
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255,255,255,${b.alpha})`;
            ctx.lineWidth = 1.4;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(b.x - b.r * 0.3, b.y - b.r * 0.35, b.r * 0.35, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,255,${b.alpha * 0.55})`;
            ctx.fill();
          }
        });
        bubbles = bubbles.filter(b => b.alpha > 0 && b.y > -20);
        if (Math.random() < 0.22) spawnBubble();
      }

      wavePhase += 0.032;
    }

    rafId = requestAnimationFrame(drawFrame);
  }

  function goTimer() {
    totalMs = minutes * 60 * 1000;
    elapsedBeforePause = 0;
    startTime = Date.now();
    currentPct = 0;
    done = false;
    running = true;
    wavePhase = 0;
    bubbles = [];
    saveState();
    showTimer();
  }

  function resetTimer() {
    cancelAnimationFrame(rafId);
    running = false; done = false;
    currentPct = 0; elapsedBeforePause = 0;
    startTime = null; wavePhase = 0; bubbles = [];
    clearState();
    ctx.clearRect(0, 0, W, H);
    timerOverlay.style.display = 'none';
    setupEl.style.display = 'flex';
  }

  // On load: restore or show setup
  tryRestore();
</script>
</body>
</html>
